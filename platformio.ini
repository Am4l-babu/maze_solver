; PlatformIO configuration — Micro-Maze Solver
; Board: Seeed Studio XIAO ESP32S3
;
; Default env (xiao_esp32s3) builds the real robot firmware from src/.
; The test_* envs each build one standalone bring-up sketch from tests/
; — flash them one at a time to verify a subsystem in isolation before
; trusting it in the full control loop. See tests/README.md.
;
;   pio run -e test_lidar_single  -t upload
;   pio run -e test_lidar_array   -t upload
;   pio run -e test_motor_encoder -t upload
;   pio run -e test_oled          -t upload
;   pio run -e test_button        -t upload

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -std=gnu++17
build_unflags =
    -std=gnu++11

lib_deps =
    adafruit/Adafruit_VL53L0X@^1.2.4
    adafruit/Adafruit MCP23017 Arduino Library@^2.3.2
    madhephaestus/ESP32Encoder@^0.11.7

; ---------------------------------------------------------------------
; Test environments — each is a standalone sketch living under tests/,
; not part of the robot firmware. src_dir stays "src" (the default) for
; every environment; build_src_filter swaps in one test file instead,
; reached via a "../" path outside src_dir. Self-contained on purpose:
; they don't depend on src/ so they stay useful while main firmware is
; mid-refactor.
; ---------------------------------------------------------------------

[env:test_lidar_single]
extends = env:xiao_esp32s3
build_src_filter = -<*> +<../tests/01_lidar_single/main.cpp>
lib_deps =
    adafruit/Adafruit_VL53L0X@^1.2.4

[env:test_lidar_array]
extends = env:xiao_esp32s3
build_src_filter = -<*> +<../tests/02_lidar_array/main.cpp>
lib_deps =
    adafruit/Adafruit_VL53L0X@^1.2.4

[env:test_motor_encoder]
extends = env:xiao_esp32s3
build_src_filter = -<*> +<../tests/03_motor_encoder/main.cpp>
lib_deps =
    adafruit/Adafruit MCP23017 Arduino Library@^2.3.2
    madhephaestus/ESP32Encoder@^0.11.7

[env:test_oled]
extends = env:xiao_esp32s3
build_src_filter = -<*> +<../tests/04_oled_display/main.cpp>
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.11
    adafruit/Adafruit GFX Library@^1.11.9

[env:test_button]
extends = env:xiao_esp32s3
build_src_filter = -<*> +<../tests/05_push_button/main.cpp>
lib_deps =
